version: '3.9'

services:

  # ── 1. BASE DE DATOS ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: c2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fhir_salud_digital}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. MINIO ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: c2-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── 3. FASTAPI BACKEND ───────────────────────────────────────
  backend:
    build: ./backend
    container_name: c2-backend
    restart: unless-stopped
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── 4. ML SERVICE (TABULAR) ──────────────────────────────────
  ml-service:
    build: ./ml-service
    container_name: c2-ml-service
    restart: unless-stopped
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── 5. DL SERVICE (IMAGEN) ──────────────────────────────────
  dl-service:
    build: ./dl-service
    container_name: c2-dl-service
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-medical-images}
      MINIO_SECURE: "false"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── 6. ORQUESTADOR ───────────────────────────────────────────
  orchestrator:
    build: ./orchestrator
    container_name: c2-orchestrator
    restart: unless-stopped
    environment:
      ML_SERVICE_URL: http://ml-service:8001
      DL_SERVICE_URL: http://dl-service:8002
      MAX_CONCURRENT: "4"
    depends_on:
      - ml-service
      - dl-service
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── 7. FRONTEND SPA ──────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: c2-frontend
    restart: unless-stopped
    networks:
      - backend-net

  # ── 8. NGINX (ENTRADA ÚNICA) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: c2-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
